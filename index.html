<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de pessoas</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <!--
      ok - o negrito dos titulos da tabela precisam ser aplicados via classe CSS
   ok - alinhar colunas numericas da tabela à direita
    - alinhar colunas alfanumericas da tabela à esquerda
   ok- estilizar os edits (arredondados)
   ok- estilizar table -->
      <div class="row">
        <h1 class="caption">Cadastro de pessoas</h1>
      </div>
      <div class="row">
        <label for="nome">Nome</label>
        <input type="text" id="nome" />
      </div>
      <div class="row">
        <label for="idade">Idade</label>
        <input type="number" id="idade" />
      </div>
      <div class="row">
        <button class="btn btn-red">Limpar</button>
        <button class="btn btn-blue">Salvar</button>
      </div>

      <div class="row">
        <h1 class="caption">Listagem de pessoas</h1>
      </div>
      <div class="row">
        <table>
          <tbody>
            <tr class="tabela-linha1">
              <td><b>#</b></td>
              <td><b>Nome</b></td>
              <td><b>Idade</b></td>
              <td><b>Edição</b></td>
            </tr>
            <tr>
              <td>001</td>
              <td class="pessoa-nome">Fulano de Tal</td>
              <td>25</td>
              <td>
                <button class="btn btn-blue">Editar</button>
                <button class="btn btn-red">Excluir</button>
              </td>
            </tr>
            <tr>
              <td>002</td>
              <td class="pessoa-nome">Cumade Zé</td>
              <td>72</td>
              <td>
                <button class="btn btn-blue">Editar</button>
                <button class="btn btn-red">Excluir</button>
              </td>
            </tr>
            <tr>
              <td>003</td>
              <td class="pessoa-nome">Genoveva</td>
              <td>104</td>
              <td>
                <button class="btn btn-blue">Editar</button>
                <button class="btn btn-red">Excluir</button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </body>
</html>
